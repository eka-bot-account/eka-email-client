name = "eka-email-client"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "MAILBOX"
database_name = "eka-mailbox"
database_id = "e107da09-1023-4365-a943-5da5d98bdc8e"
migrations_dir = "migrations"

[vars]
# Non-secret config. Kept here (not just in the dashboard) so `wrangler deploy`
# does not drop it — wrangler removes any vars not present in this file.
EMAIL_WORKER_URL = "https://eka-email-worker.hello-3fd.workers.dev"

# Secrets (set via `wrangler secret put`, persist across deploys):
# AUTH_TOKEN - Bearer token for accessing the web UI
# EMAIL_API_TOKEN - Bearer token for the email worker API
